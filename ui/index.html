<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deep Research Agent</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1b26;
      --border: #2a2b3d;
      --text: #c0caf5;
      --muted: #565f89;
      --accent: #7aa2f7;
      --accent-dim: #3d59a1;
      --green: #9ece6a;
      --yellow: #e0af68;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header {
      width: 100%;
      padding: 1.5rem 2rem;
      border-bottom: 1px solid var(--border);
      text-align: center;
    }
    header h1 { font-size: 1.4rem; font-weight: 600; }
    header p { color: var(--muted); font-size: 0.85rem; margin-top: 0.3rem; }
    main {
      width: 100%;
      max-width: 800px;
      padding: 2rem 1.5rem;
      flex: 1;
    }

    /* Input */
    .input-group {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }
    textarea {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 0.75rem 1rem;
      font-size: 0.95rem;
      font-family: inherit;
      resize: vertical;
      min-height: 52px;
      max-height: 160px;
    }
    textarea:focus { outline: none; border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }
    button {
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 8px;
      padding: 0 1.5rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Config */
    .config-row {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .config-row label { display: flex; align-items: center; gap: 0.4rem; }
    .config-row input[type="number"] {
      width: 56px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 0.3rem 0.5rem;
      font-size: 0.85rem;
      text-align: center;
    }
    .config-row input:focus { outline: none; border-color: var(--accent); }
    .config-row select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 0.3rem 0.5rem;
      font-size: 0.85rem;
    }
    .config-row select:focus { outline: none; border-color: var(--accent); }
    .config-row .pct { color: var(--muted); }

    /* Progress */
    .progress {
      display: none;
      margin-bottom: 1.5rem;
      padding: 1rem 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .progress.active { display: block; }
    .progress h3 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }
    .nodes {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .node-badge {
      padding: 0.3rem 0.7rem;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 500;
      background: var(--border);
      color: var(--muted);
      transition: all 0.2s;
    }
    .node-badge.active {
      background: var(--accent-dim);
      color: var(--accent);
      animation: pulse 1.5s infinite;
    }
    .node-badge.done {
      background: #1a2e1a;
      color: var(--green);
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    .iteration-info {
      margin-top: 0.6rem;
      font-size: 0.8rem;
      color: var(--yellow);
    }
    .status-info {
      margin-top: 0.8rem;
      font-size: 0.9rem;
      color: var(--text);
    }
    .query-list {
      margin-top: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .query-item {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      padding: 0.65rem 0.8rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.02);
      font-size: 0.85rem;
      line-height: 1.4;
    }
    .query-item.done {
      opacity: 0.75;
      border-color: #27402a;
    }
    .query-spinner {
      width: 12px;
      height: 12px;
      border: 2px solid var(--accent-dim);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin-top: 0.15rem;
      flex-shrink: 0;
    }
    .query-item.done .query-spinner {
      animation: none;
      border: none;
      width: 12px;
      height: 12px;
      margin-top: 0.05rem;
      color: var(--green);
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Report */
    .report {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem 1.75rem;
      line-height: 1.7;
    }
    .report.visible { display: block; }
    .report h1, .report h2, .report h3 { color: var(--accent); margin: 1.2rem 0 0.5rem; }
    .report h1 { font-size: 1.4rem; }
    .report h2 { font-size: 1.15rem; }
    .report h3 { font-size: 1rem; }
    .report p { margin-bottom: 0.75rem; }
    .report ul, .report ol { margin: 0.5rem 0 0.75rem 1.5rem; }
    .report li { margin-bottom: 0.3rem; }
    .report strong { color: #fff; }
    .report code {
      background: var(--border);
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      font-size: 0.85em;
    }
    .report a { color: var(--accent); text-decoration: none; }
    .report a:hover { text-decoration: underline; }
    .report hr { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }
    .report blockquote {
      border-left: 3px solid var(--accent-dim);
      padding-left: 1rem;
      color: var(--muted);
      margin: 0.75rem 0;
    }

    .error {
      background: #2d1a1a;
      border: 1px solid #5c2828;
      color: #f7768e;
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1rem;
      display: none;
      font-size: 0.9rem;
    }
    .error.visible { display: block; }
  </style>
</head>
<body>

<header>
  <h1>Deep Research Agent</h1>
  <p>Multi-step web research with iterative refinement</p>
</header>

<main>
  <div class="input-group">
    <textarea id="query" rows="2" placeholder="What would you like to research?"></textarea>
    <button id="run-btn" onclick="runResearch()">Research</button>
  </div>

  <div class="config-row">
    <label>Max iterations <input type="number" id="max-iter" value="3" min="1" max="10"></label>
    <label>Comprehension threshold <input type="number" id="comp-thresh" value="90" min="0" max="100"><span class="pct">%</span></label>
    <label>Report style
      <select id="report-style">
        <option value="detailed" selected>Detailed (~2000-4000 words)</option>
        <option value="brief">Brief (~500-1000 words)</option>
      </select>
    </label>
  </div>

  <div class="error" id="error"></div>

  <div class="progress" id="progress">
    <h3>Progress</h3>
    <div class="nodes" id="nodes">
      <span class="node-badge" data-node="plan">Plan</span>
      <span class="node-badge" data-node="search">Search</span>
      <span class="node-badge" data-node="analyze">Analyze</span>
      <span class="node-badge" data-node="reflect">Reflect</span>
      <span class="node-badge" data-node="write">Write</span>
    </div>
    <div class="iteration-info" id="iteration-info"></div>
    <div class="iteration-info" id="score-info"></div>
    <div class="status-info" id="status-info"></div>
    <div class="query-list" id="query-list"></div>
  </div>

  <div class="report" id="report"></div>
</main>

<script>
async function runResearch() {
  const query = document.getElementById("query").value.trim();
  if (!query) return;

  const btn = document.getElementById("run-btn");
  const progress = document.getElementById("progress");
  const reportEl = document.getElementById("report");
  const errorEl = document.getElementById("error");
  const iterInfo = document.getElementById("iteration-info");
  const scoreInfo = document.getElementById("score-info");
  const statusInfo = document.getElementById("status-info");
  const queryList = document.getElementById("query-list");

  // Reset UI
  btn.disabled = true;
  btn.textContent = "Researching...";
  errorEl.classList.remove("visible");
  reportEl.classList.remove("visible");
  reportEl.innerHTML = "";
  progress.classList.add("active");
  iterInfo.textContent = "";
  scoreInfo.textContent = "";
  statusInfo.textContent = "";
  queryList.innerHTML = "";
  document.querySelectorAll(".node-badge").forEach(b => b.className = "node-badge");

  const completedNodes = new Set();
  let currentNode = null;
  let activeQueries = [];
  let searchesInFlight = false;

  function renderQueries() {
    queryList.innerHTML = "";
    if (!activeQueries.length) return;

    activeQueries.forEach(q => {
      const item = document.createElement("div");
      item.className = `query-item${searchesInFlight ? "" : " done"}`;

      const icon = document.createElement("div");
      icon.className = "query-spinner";
      icon.textContent = searchesInFlight ? "" : "✓";

      const text = document.createElement("div");
      text.textContent = q;

      item.appendChild(icon);
      item.appendChild(text);
      queryList.appendChild(item);
    });
  }

  function markNode(name) {
    if (currentNode && currentNode !== name) completedNodes.add(currentNode);
    currentNode = name;

    document.querySelectorAll(".node-badge").forEach(badge => {
      const nodeName = badge.dataset.node;
      badge.className = "node-badge";
      if (nodeName === currentNode) {
        badge.classList.add("active");
      } else if (completedNodes.has(nodeName)) {
        badge.classList.add("done");
      }
    });
  }

  try {
    const res = await fetch("/api/research", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        query,
        max_iterations: parseInt(document.getElementById("max-iter").value) || 3,
        comprehension_threshold: parseInt(document.getElementById("comp-thresh").value) || 90,
        report_style: document.getElementById("report-style").value,
      }),
    });

    if (!res.ok) throw new Error(`Server error: ${res.status}`);

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";
    let finalReport = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split("\n");
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        try {
          const data = JSON.parse(line.slice(6));
          if (data.active_node) {
            markNode(data.active_node);
          } else if (data.node && !currentNode) {
            markNode(data.node);
          }
          if (data.iteration) iterInfo.textContent = `Research iteration ${data.iteration}`;
          if (data.score != null) scoreInfo.textContent = `Comprehension: ${data.score}%`;
          if (data.status) statusInfo.textContent = data.status;
          if (Array.isArray(data.pending_queries)) {
            activeQueries = data.pending_queries;
            searchesInFlight = activeQueries.length > 0;
            renderQueries();
          }
          if (data.search_complete) {
            searchesInFlight = false;
            renderQueries();
          }
          if (data.report) finalReport = data.report;
        } catch (e) { /* skip */ }
      }
    }

    // Mark all done
    document.querySelectorAll(".node-badge").forEach(badge => {
      badge.className = "node-badge done";
    });

    if (finalReport) {
      reportEl.innerHTML = marked.parse(finalReport);
      reportEl.classList.add("visible");
    } else {
      errorEl.textContent = "No report generated. Check server logs.";
      errorEl.classList.add("visible");
    }
  } catch (err) {
    errorEl.textContent = err.message;
    errorEl.classList.add("visible");
  } finally {
    btn.disabled = false;
    btn.textContent = "Research";
  }
}

document.getElementById("query").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) {
    e.preventDefault();
    runResearch();
  }
});
</script>
</body>
</html>
